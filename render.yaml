services:
  - type: web
    name: meu-isaque-e-minha-rebeca
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meu-isaque-db
          property: connectionString

databases:
  - name: meu-isaque-db
    databaseName: registros
    plan: free
